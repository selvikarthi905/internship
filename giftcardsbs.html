<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gift cards</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <h1 class="text-center"> Explore popular Amazon Pay Gift cards </h1>
    <div class="container">
        <div class="row">
            <div class="col order-last m-5">
                <div class="card" style="width: 18rem;">
                    <img src="public/your1.jpg" class="card-img-top" alt="yourphoto">
                    <div class="card-body">
                        <p class="card-text text-center">Your Photo</p>
                    </div>
                </div>
            </div>
            <div class="col m-5">
                <div class="card" style="width: 18rem;">
                    <img src="public/Ani.jpg" class="card-img-top" alt="animated">
                    <div class="card-body">
                        <p class="card-text text-center">Animated</p>
                    </div>
                </div>
            </div>
            <div class="col order-first m-5">
                <div class="card" style="width: 18rem;">
                    <img src="public/phy2.jpg" class="card-img-top" alt="physical">
                    <div class="card-body">
                        <p class="card-text text-center ">Physical</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
