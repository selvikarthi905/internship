<!DOCTYPE html>
<html lang="en">
<style>
    #para1 {
        text-align: center;
        color: rgb(2, 1, 23)
    }

    .para2 {
        text-align: center;
        color: rgb(2, 34, 34);
    }
</style>
</head>

<body style="background-color:rgb(130, 102, 152);">
    <h1 style="color: rgb(75, 11, 89); text-align: center;">INTERNAL CSS</h1>
    <p id="para1">Welcome to Internal CSS Practice. This paragraph is styled using an ID selector, which applies a
        alignment and a red text color.</p>
    <p class="para2">This is the second paragraph. It is styled using a Class selector, which aligns the text to the
        center and applies an aquamarine color.</p>
</body>

</html>
